<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Config Chatbot</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 1rem; }
    #log { border: 1px solid #ccc; min-height: 200px; padding: 0.5rem; margin-bottom: 0.5rem; white-space: pre-wrap; }
    .user { color: #06c; }
    .bot { color: #080; }
    input[type="text"] { width: 70%; padding: 0.3rem; }
    button { padding: 0.3rem 0.6rem; }
  </style>
</head>
<body>
  <h1>Config Chatbot (SSE)</h1>
  <p>Gửi message → stream token từ agent. Backend: <code>POST /chat/stream</code></p>
  <div id="log"></div>
  <form id="f">
    <input type="text" id="msg" placeholder="Nhập message..." autocomplete="off" />
    <button type="submit">Gửi</button>
  </form>
  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('f');
    const msg = document.getElementById('msg');
    let conversationId = 'web-' + Math.random().toString(36).slice(2, 10);

    function add(role, text) {
      const line = document.createElement('div');
      line.className = role;
      line.textContent = (role === 'user' ? 'You: ' : 'Bot: ') + text;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = msg.value.trim();
      if (!text) return;
      add('user', text);
      msg.value = '';
      const botLine = document.createElement('div');
      botLine.className = 'bot';
      botLine.textContent = 'Bot: ';
      log.appendChild(botLine);
      log.scrollTop = log.scrollHeight;

      try {
        const res = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, conversation_id: conversationId })
        });
        if (!res.ok) throw new Error(res.statusText);
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'token' && data.content) botLine.textContent += data.content;
                if (data.type === 'done') { if (data.content && !botLine.textContent.trim().endsWith(data.content)) botLine.textContent += data.content; }
                if (data.type === 'error') botLine.textContent += ' [Error: ' + data.content + ']';
              } catch (_) {}
            }
          }
          log.scrollTop = log.scrollHeight;
        }
      } catch (err) {
        botLine.textContent += ' [Error: ' + err.message + ']';
      }
    });
  </script>
</body>
</html>
